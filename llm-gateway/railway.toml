# Railway configuration for Qwen3.5-4B LLM Gateway
# This file configures the deployment settings for Railway

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Resource configuration
# Recommended: 8GB RAM, 4 vCPU for optimal performance
# Minimum: 6GB RAM, 2 vCPU for basic operation

[[services]]
name = "llm-gateway"

[services.variables]
# Server configuration
HOST = "0.0.0.0"
PORT = "8080"

# Model configuration
MODEL_PATH = "/models/qwen3.5-4b-instruct-q4_K_M.gguf"
CONTEXT_SIZE = "262000"

# Performance tuning (CPU-only on Railway)
GPU_LAYERS = "0"
THREADS = "4"
BATCH_SIZE = "512"

# Environment
RAILWAY_ENVIRONMENT = "production"

# Optional: Set these in Railway dashboard for security
# API_KEY = "your-secret-key-here"

[services.healthcheck]
# Health check endpoint (llama.cpp provides this)
path = "/health"
interval = 30
timeout = 10
retries = 3
startPeriod = 60

# Scaling configuration
# Uncomment to enable auto-scaling based on CPU/memory usage
# [[services.autoscaling]]
# minReplicas = 1
# maxReplicas = 5
#
# [[services.autoscaling.metrics]]
# type = "CPU"
# target = 70
#
# [[services.autoscaling.metrics]]
# type = "Memory"
# target = 80

# Domain configuration (optional - Railway provides auto-generated domains)
# [[services.domains]]
# name = "llm-gateway.yourdomain.com"

# Volume configuration (if persistent storage needed)
# [[services.volumes]]
# name = "llm-cache"
# mountPath = "/cache"
# sizeGB = 10
